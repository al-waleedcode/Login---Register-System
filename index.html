<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md relative overflow-hidden">
        
        <div id="alertBox" class="hidden mb-4 p-3 rounded text-center font-bold text-sm"></div>

        <div id="loginFormContainer" class="block">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">تسجيل الدخول 🔐</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" dir="ltr">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">كلمة المرور</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" dir="ltr">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition font-bold">دخول</button>
            </form>
            <p class="text-center mt-4 text-sm text-gray-600">
                ليس لديك حساب؟ <button onclick="toggleForms()" class="text-blue-600 font-bold hover:underline">سجل الآن</button>
            </p>
        </div>

        <div id="registerFormContainer" class="hidden">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">إنشاء حساب جديد 📝</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">الاسم الكامل</label>
                    <input type="text" id="regName" required minlength="3" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2">البريد الإلكتروني</label>
                    <input type="email" id="regEmail" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-500" dir="ltr">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2">كلمة المرور</label>
                    <input type="password" id="regPassword" required minlength="6" placeholder="6 أحرف على الأقل" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-500" dir="ltr">
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition font-bold">إنشاء حساب</button>
            </form>
            <p class="text-center mt-4 text-sm text-gray-600">
                لديك حساب بالفعل؟ <button onclick="toggleForms()" class="text-green-600 font-bold hover:underline">سجل دخول</button>
            </p>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
